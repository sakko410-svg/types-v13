<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>診断｜ナイトタイプ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    body { overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }

    .quiz-bg { position:fixed;inset:0;z-index:0;background:#08060f;overflow:hidden; }
    .quiz-bg-orb { position:absolute;border-radius:50%;filter:blur(70px);opacity:0.55;animation:orbFloat 8s ease-in-out infinite; }
    .quiz-bg-orb:nth-child(1){width:380px;height:380px;background:radial-gradient(circle,#6d28d9,transparent);top:-80px;left:-60px;animation-delay:0s;}
    .quiz-bg-orb:nth-child(2){width:300px;height:300px;background:radial-gradient(circle,#db2777,transparent);bottom:60px;right:-40px;animation-delay:-3s;}
    .quiz-bg-orb:nth-child(3){width:240px;height:240px;background:radial-gradient(circle,#0ea5e9,transparent);top:40%;left:60%;animation-delay:-5s;opacity:0.3;}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(24px,-18px) scale(1.06);}66%{transform:translate(-16px,22px) scale(0.95);}}

    .quiz-page { position:fixed;inset:0;z-index:1;display:flex;flex-direction:column; }

    /* トップバー */
    .quiz-topbar { padding:52px 22px 0;flex-shrink:0; }
    .topbar-row { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px; }
    .topbar-logo { font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;text-decoration:none;letter-spacing:0.05em; }
    .topbar-counter { font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:0.12em;color:rgba(255,255,255,0.4); }
    .topbar-counter span { color:#c4b5fd;font-size:1rem; }

    /* ドット式プログレス */
    .progress-dots { display:flex;gap:4px;align-items:center;flex-wrap:wrap;padding:0 2px; }
    .prog-dot { height:4px;border-radius:999px;background:rgba(255,255,255,0.1);transition:all 0.4s cubic-bezier(0.4,0,0.2,1);flex:1; }
    .prog-dot.done { background:linear-gradient(90deg,#7c3aed,#db2777); }
    .prog-dot.current { background:linear-gradient(90deg,#a78bfa,#f472b6);box-shadow:0 0 8px rgba(167,139,250,0.7);flex:1.8; }

    /* カードスタック */
    .card-stack { flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:12px 18px 4px; }

    .q-card-back { position:absolute;width:calc(100% - 56px);max-width:400px;border-radius:28px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);padding:28px 24px;transform:scale(0.92) translateY(14px);opacity:0.45;pointer-events:none;transition:transform 0.35s,opacity 0.35s;backdrop-filter:blur(12px); }
    .q-card-back.peek { transform:scale(0.95) translateY(9px);opacity:0.6; }
    .back-line { height:10px;border-radius:5px;background:rgba(255,255,255,0.06);margin-bottom:10px; }
    .back-line:last-child { width:65%; }

    .q-card-main { position:relative;z-index:5;width:calc(100% - 28px);max-width:440px;border-radius:28px;background:rgba(255,255,255,0.055);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:28px 24px 22px;box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,0 20px 60px rgba(0,0,0,0.6),0 4px 20px rgba(109,40,217,0.15);cursor:grab;user-select:none;touch-action:pan-y;will-change:transform; }
    .q-card-main:active { cursor:grabbing; }

    .card-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:18px; }
    .card-tag { font-family:'Syne',sans-serif;font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;color:#a78bfa;display:flex;align-items:center;gap:7px; }
    .card-tag-dot { width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#db2777);box-shadow:0 0 8px rgba(124,58,237,0.8);animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.7}}
    .card-num { font-family:'Syne',sans-serif;font-weight:800;font-size:0.7rem;color:rgba(255,255,255,0.18);letter-spacing:0.05em; }
    .card-question { font-size:1.05rem;font-weight:500;line-height:1.85;color:rgba(255,255,255,0.9);min-height:80px;margin:0 0 20px;letter-spacing:0.02em; }

    /* スワイプラベル */
    .swipe-label { position:absolute;padding:8px 16px;border-radius:12px;font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;letter-spacing:0.1em;opacity:0;pointer-events:none;z-index:20;transition:opacity 0.06s; }
    .swipe-label.yes { top:24px;right:18px;transform:rotate(14deg);background:rgba(109,40,217,0.2);border:2.5px solid #a78bfa;color:#c4b5fd;box-shadow:0 0 20px rgba(167,139,250,0.25); }
    .swipe-label.no  { top:24px;left:18px;transform:rotate(-14deg);background:rgba(219,39,119,0.15);border:2.5px solid #f472b6;color:#f9a8d4;box-shadow:0 0 20px rgba(244,114,182,0.25); }

    /* ── 5択ボタンエリア ── */
    .action-area { flex-shrink:0;padding:6px 16px 20px; }

    /* 5択ボタン行 */
    .five-btns {
      display:flex;gap:8px;margin-bottom:10px;align-items:flex-end;
    }
    .btn-5 {
      flex:1;border:none;cursor:pointer;border-radius:16px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.18s,opacity 0.15s;
      position:relative;overflow:hidden;
    }
    .btn-5:active { transform:scale(0.88) !important; }

    /* 強くそう思う */
    .btn-5-1 { height:62px;background:rgba(109,40,217,0.25);border:1.5px solid rgba(167,139,250,0.5);box-shadow:0 4px 18px rgba(109,40,217,0.2); }
    .btn-5-1:hover { transform:translateY(-3px);box-shadow:0 10px 28px rgba(109,40,217,0.35); }
    /* そう思う */
    .btn-5-2 { height:54px;background:rgba(109,40,217,0.14);border:1.5px solid rgba(167,139,250,0.3); }
    .btn-5-2:hover { transform:translateY(-3px);box-shadow:0 8px 22px rgba(109,40,217,0.2); }
    /* どちらでもない */
    .btn-5-3 { height:46px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.12); }
    .btn-5-3:hover { transform:translateY(-2px);background:rgba(255,255,255,0.09); }
    /* そう思わない */
    .btn-5-4 { height:54px;background:rgba(219,39,119,0.12);border:1.5px solid rgba(244,114,182,0.28); }
    .btn-5-4:hover { transform:translateY(-3px);box-shadow:0 8px 22px rgba(219,39,119,0.18); }
    /* 強くそう思わない */
    .btn-5-5 { height:62px;background:rgba(219,39,119,0.22);border:1.5px solid rgba(244,114,182,0.45);box-shadow:0 4px 18px rgba(219,39,119,0.18); }
    .btn-5-5:hover { transform:translateY(-3px);box-shadow:0 10px 28px rgba(219,39,119,0.32); }

    .btn-5-emoji { font-size:1.4rem;line-height:1; }
    .btn-5-1 .btn-5-emoji,.btn-5-5 .btn-5-emoji { font-size:1.6rem; }
    .btn-5-3 .btn-5-emoji { font-size:1.1rem; }

    .btn-5-label { font-family:'Syne',sans-serif;font-weight:700;font-size:0.48rem;letter-spacing:0.06em;line-height:1.3;text-align:center; }
    .btn-5-1 .btn-5-label { color:#c4b5fd; }
    .btn-5-2 .btn-5-label { color:#a78bfa; }
    .btn-5-3 .btn-5-label { color:rgba(255,255,255,0.35); }
    .btn-5-4 .btn-5-label { color:#f9a8d4; }
    .btn-5-5 .btn-5-label { color:#fda4af; }

    /* ラベル下テキスト */
    .scale-hint { display:flex;justify-content:space-between;padding:0 4px;margin-bottom:8px; }
    .scale-hint span { font-size:0.55rem;color:rgba(255,255,255,0.22);font-family:'Syne',sans-serif; }

    /* 戻るボタン */
    .sub-btns { display:flex;justify-content:center; }
    .btn-back { display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:9px 20px;color:rgba(255,255,255,0.3);cursor:pointer;font-family:'Syne',sans-serif;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;transition:all 0.2s; }
    .btn-back:hover:not(:disabled){border-color:rgba(167,139,250,0.4);color:#c4b5fd;background:rgba(109,40,217,0.1);}
    .btn-back:disabled{opacity:0.2;pointer-events:none;}

    /* 分析ローディング */
    .analyzing-overlay{position:fixed;inset:0;z-index:300;background:#08060f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:0;pointer-events:none;transition:opacity 0.5s;}
    .analyzing-overlay.show{opacity:1;pointer-events:all;}
    .analyzing-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;background:linear-gradient(135deg,#c4b5fd,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
    .analyzing-sub{font-size:0.72rem;color:rgba(255,255,255,0.35);letter-spacing:0.15em;text-align:center;}
    .analyzing-bar-wrap{width:200px;height:3px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;}
    .analyzing-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#db2777);border-radius:999px;transition:width 0.15s;}
    .analyzing-chars{display:flex;gap:10px;margin-bottom:8px;}
    .analyzing-chars img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.1);opacity:0;transform:scale(0.5);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    .analyzing-chars img.show{opacity:1;transform:scale(1);}

    /* 確認ダイアログ */
    .confirm-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.8);backdrop-filter:blur(16px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
    .confirm-overlay.show{opacity:1;pointer-events:all;}
    .confirm-sheet{width:100%;max-width:480px;background:rgba(20,16,32,0.98);border-radius:28px 28px 0 0;border:1px solid rgba(255,255,255,0.1);border-bottom:none;padding:32px 24px 48px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
    .confirm-overlay.show .confirm-sheet{transform:translateY(0);}
    .confirm-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);margin:0 auto 24px;}
    .confirm-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:8px;text-align:center;color:#fff;}
    .confirm-desc{font-size:0.8rem;color:rgba(255,255,255,0.4);line-height:1.7;text-align:center;margin-bottom:24px;}
    .confirm-yes{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;margin-bottom:10px;transition:all 0.2s;}
    .confirm-no{width:100%;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.4);font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;}

    .particle-canvas{position:fixed;inset:0;z-index:200;pointer-events:none;}
  </style>
</head>
<body>

<script src="./questions.js"></script>

<script>
let idx = 0;
const scores = {}, history = [];

const card     = document.getElementById('qCard');
const cardBack = document.getElementById('qCardBack');
const qEl      = document.getElementById('question');
const qNum     = document.getElementById('qNum');
const currentQ = document.getElementById('currentQ');
const overlay  = document.getElementById('analyzingOverlay');
const bar      = document.getElementById('analyzingBar');
const backBtn  = document.getElementById('backBtn');
const labelYes = document.getElementById('labelYes');
const labelNo  = document.getElementById('labelNo');
const pCanvas  = document.getElementById('particleCanvas');
const pCtx     = pCanvas.getContext('2d');
const dotsWrap = document.getElementById('progressDots');

function resizePC(){ pCanvas.width=window.innerWidth; pCanvas.height=window.innerHeight; }
resizePC(); window.addEventListener('resize',resizePC);

// 分析キャラ
Object.keys(types).slice(0,5).forEach(k=>{
  const t=types[k]; if(!t.image)return;
  const img=document.createElement('img'); img.src=t.image;
  document.getElementById('analyzingChars').appendChild(img);
});

if(new URLSearchParams(location.search).get('restart')==='1'){
  localStorage.removeItem('nightTypeScores');
}

function buildDots(){
  dotsWrap.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='prog-dot'+(i<idx?' done':i===idx?' current':'');
    dotsWrap.appendChild(d);
  });
}

function pad(n){ return n<10?'0'+n:''+n; }

function show(){
  qEl.textContent=questions[idx].text;
  qNum.textContent=pad(idx+1)+' / '+questions.length;
  currentQ.textContent=idx+1;
  backBtn.disabled=idx===0;
  buildDots();
  cardBack.classList.toggle('peek',idx+1<questions.length);
}

// ── 効果音 ──
let audioCtx=null;
function getAudio(){ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playSound(val){
  try{
    const ctx=getAudio();
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine';
    // val: 2=高め, 1=やや高, 0=中立, -1=やや低, -2=低め
    const freqMap={2:[520,780],1:[460,640],0:[380,380],'-1':[340,240],'-2':[300,180]};
    const [f0,f1]=freqMap[val]||[380,380];
    osc.frequency.setValueAtTime(f0,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(Math.max(f1,10),ctx.currentTime+0.12);
    gain.gain.setValueAtTime(0.14,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
    osc.start(); osc.stop(ctx.currentTime+0.3);
  }catch(e){}
}

// ── パーティクル ──
let particles=[];
function spawnParticles(val,x,y){
  const positive=val>0;
  const colors=positive
    ?['#a78bfa','#c4b5fd','#f472b6','#f9a8d4','#7c3aed']
    :val===0
    ?['#94a3b8','#cbd5e1','#e2e8f0']
    :['#f472b6','#fda4af','#fb7185'];
  const count=positive?[0,24,18][Math.abs(val)]||20:val===0?10:18;
  for(let i=0;i<count;i++){
    const angle=(Math.PI*2/count)*i+Math.random()*0.6;
    const speed=2+Math.random()*5*Math.max(Math.abs(val)/2,0.3);
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-(positive?2.5:0.5),
      color:colors[i%colors.length],size:positive?4+Math.random()*6:3+Math.random()*4,
      life:1,decay:0.025+Math.random()*0.02,gravity:0.2,
      emoji:val===2&&Math.random()<0.4?'✨':null});
  }
}
function animateP(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.97;p.life-=p.decay;
    pCtx.globalAlpha=Math.max(0,p.life);
    if(p.emoji){pCtx.font=`${Math.max(4,p.size*2*p.life)}px sans-serif`;pCtx.fillText(p.emoji,p.x,p.y);}
    else{pCtx.fillStyle=p.color;pCtx.beginPath();pCtx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,Math.PI*2);pCtx.fill();}
    pCtx.globalAlpha=1;
  });
  if(particles.length>0)requestAnimationFrame(animateP);
  else pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
}

// ── カード飛ばし ──
function flyCard(isPositive,cb){
  const tx=isPositive?window.innerWidth*1.4:-window.innerWidth*1.4;
  const rot=isPositive?28:-28;
  card.style.transition='transform 0.36s cubic-bezier(0.5,0,1,0.5),opacity 0.32s';
  card.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
  card.style.opacity='0';
  cardBack.style.transition='transform 0.32s cubic-bezier(0.34,1.2,0.64,1),opacity 0.32s';
  cardBack.style.transform='scale(1) translateY(0)';
  cardBack.style.opacity='0.75';
  setTimeout(()=>{
    card.style.transition='';card.style.transform='';card.style.opacity='';
    cardBack.style.transition='';cardBack.style.transform='';cardBack.style.opacity='';
    cb();
  },340);
}

// ── 回答（5択：-2〜+2） ──
function answer(val){
  history.push({type:questions[idx].type,val});
  scores[questions[idx].type]=(scores[questions[idx].type]||0)+val;
  playSound(val);
  const rect=card.getBoundingClientRect();
  spawnParticles(val,rect.left+rect.width/2,rect.top+rect.height/2);
  requestAnimationFrame(animateP);
  idx++;
  if(idx<questions.length){
    flyCard(val>=0,show);
  }else{
    flyCard(val>=0,()=>{
      localStorage.setItem('nightTypeScores',JSON.stringify(scores));
      overlay.classList.add('show');
      document.getElementById('analyzingChars').querySelectorAll('img').forEach((im,i)=>setTimeout(()=>im.classList.add('show'),i*180));
      let p=0;
      const iv=setInterval(()=>{p=Math.min(p+2,100);bar.style.width=p+'%';if(p>=100){clearInterval(iv);setTimeout(()=>window.location.href='result.html',400);}},30);
    });
  }
}

// 5択ボタン
document.querySelectorAll('.btn-5').forEach(btn=>{
  btn.addEventListener('click',()=>answer(parseInt(btn.dataset.val)));
});

// 戻る
backBtn.addEventListener('click',()=>{
  if(!history.length)return;
  const last=history.pop(); idx--;
  scores[last.type]=(scores[last.type]||0)-last.val;
  card.style.transition='transform 0.35s cubic-bezier(0.34,1.3,0.64,1),opacity 0.25s';
  card.style.transform='scale(0.93) translateY(6px)';
  card.style.opacity='0.6';
  setTimeout(()=>{card.style.transition='';card.style.transform='';card.style.opacity='';show();},200);
});

// ── スワイプ（5択対応：距離でスコアを変える） ──
let startX=0,startY=0,dragging=false,curX=0;
const T1=60, T2=110; // 距離閾値

function dragStart(x,y){startX=x;startY=y;dragging=true;curX=0;}
function dragMove(x,y){
  if(!dragging)return;
  const dx=x-startX,dy=y-startY;
  if(Math.abs(dy)>Math.abs(dx)*1.5){dragging=false;resetCard();return;}
  curX=dx;
  const r=Math.min(Math.abs(dx)/T2,1);
  card.style.transform=`translateX(${dx*0.52}px) rotate(${dx*0.038}deg)`;
  if(dx>12){
    labelYes.style.opacity=Math.min(r*1.2,1);labelNo.style.opacity=0;
    card.style.boxShadow=`6px 0 30px rgba(109,40,217,${0.3*r}),0 20px 60px rgba(0,0,0,0.6)`;
  }else if(dx<-12){
    labelNo.style.opacity=Math.min(r*1.2,1);labelYes.style.opacity=0;
    card.style.boxShadow=`-6px 0 30px rgba(219,39,119,${0.28*r}),0 20px 60px rgba(0,0,0,0.6)`;
  }else{labelYes.style.opacity=0;labelNo.style.opacity=0;card.style.boxShadow='';}
}
function resetCard(){
  labelYes.style.opacity=0;labelNo.style.opacity=0;card.style.boxShadow='';
  card.style.transition='transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
  card.style.transform='';
  setTimeout(()=>card.style.transition='',450);
}
function dragEnd(){
  if(!dragging)return;dragging=false;
  if(curX>T2)       answer(2);
  else if(curX>T1)  answer(1);
  else if(curX<-T2) answer(-2);
  else if(curX<-T1) answer(-1);
  else resetCard();
}

card.addEventListener('touchstart',e=>dragStart(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
card.addEventListener('touchmove', e=>dragMove(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
card.addEventListener('touchend',  dragEnd);
card.addEventListener('mousedown', e=>{dragStart(e.clientX,e.clientY);card.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>dragMove(e.clientX,e.clientY));
window.addEventListener('mouseup',()=>{card.style.cursor='';dragEnd();});

// 確認ダイアログ
const confirmOverlay=document.getElementById('confirmOverlay');
document.getElementById('topbarLogo').addEventListener('click',e=>{if(idx>0){e.preventDefault();confirmOverlay.classList.add('show');}});
document.getElementById('confirmYes').addEventListener('click',()=>window.location.href='quiz.html?restart=1');
document.getElementById('confirmNo').addEventListener('click',()=>confirmOverlay.classList.remove('show'));

show();
</script>
