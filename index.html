<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ナイトタイプ診断</title>
    <!-- OGP -->
  <meta property="og:title" content="ナイトタイプ診断 | NightType"/>
  <meta property="og:description" content="24の質問であなたの夜のスタイルが分かる。16タイプの中からぴったりの答えを見つけよう。"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://nighttype.jp"/>
  <meta property="og:image" content="https://nighttype.jp/images/A1.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="ナイトタイプ診断 | NightType"/>
  <meta name="twitter:description" content="24の質問であなたの夜のスタイルが分かる。"/>
  <meta name="twitter:image" content="https://nighttype.jp/images/A1.png"/>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    /* ─ Hero layout ─ */
    .home-hero { padding: 32px 20px 0; text-align:center; display:flex; flex-direction:column; align-items:center; }

    /* ─ Floating chars grid behind hero ─ */
    .float-grid {
      display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
      width:100%; max-width:440px; margin:28px auto 0; padding:0 4px;
    }
    .float-card {
      border-radius:16px; overflow:hidden; position:relative;
      border:1px solid var(--border);
      background:var(--surface);
      animation: floatUp 3s ease-in-out infinite;
      cursor:pointer; text-decoration:none;
      display:block;
    }
    .float-card:nth-child(2n)   { animation-delay:0.4s; }
    .float-card:nth-child(3n)   { animation-delay:0.8s; }
    .float-card:nth-child(4n)   { animation-delay:1.2s; }
    .float-card:nth-child(5n)   { animation-delay:0.6s; }
    .float-card:nth-child(7n)   { animation-delay:1.0s; }
    @keyframes floatUp {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-6px); }
    }
    .float-card img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
    .float-card .fc-icon { width:100%; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; font-size:2.2rem; background:var(--surface2); }
    .float-card .fc-overlay {
      position:absolute; bottom:0; left:0; right:0;
      padding:6px 6px 8px;
      background:linear-gradient(transparent, rgba(10,10,15,0.92));
    }
    .float-card .fc-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.55rem; color:var(--purple-ll); line-height:1.3; }
    .float-card:hover { border-color:var(--purple-l); transform:translateY(-8px) scale(1.03) !important; box-shadow:0 12px 28px rgba(124,58,237,0.4); transition:all 0.2s; }

    /* ─ Marquee strip ─ */
    .marquee-wrap { overflow:hidden; width:100%; margin:24px 0 0; }
    .marquee-track { display:flex; gap:12px; animation:marquee 24s linear infinite; width:max-content; }
    .marquee-wrap:hover .marquee-track { animation-play-state:paused; }
    @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .mq-chip {
      flex-shrink:0; display:flex; align-items:center; gap:8px;
      padding:8px 14px; border-radius:999px;
      background:var(--surface); border:1px solid var(--border);
      font-size:0.68rem; color:var(--muted); white-space:nowrap;
    }
    .mq-chip img { width:22px; height:22px; border-radius:50%; object-fit:cover; }
    .mq-chip span { font-family:'Syne',sans-serif; font-size:0.62rem; color:var(--purple-ll); font-weight:700; }

    /* ─ Bottom CTA ─ */
    .home-cta {
      padding:32px 20px 60px; display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .stat-row { display:flex; gap:10px; margin-bottom:4px; }
    .stat-pill {
      padding:8px 16px; border-radius:999px;
      background:var(--surface); border:1px solid var(--border);
      font-size:0.68rem; color:var(--muted); display:flex; align-items:center; gap:6px;
    }
    .stat-pill b { font-family:'Syne',sans-serif; color:var(--purple-ll); font-size:0.85rem; }
  </style>
  <!-- Google Analytics (GA_MEASUREMENT_IDをご自身のIDに置き換えてください) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'GA_MEASUREMENT_ID');
  </script>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="noise"></div>

<nav class="navbar">
  <a href="index.html" class="nav-logo">NightType</a>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="drawer" id="drawer">
  <a href="index.html" class="active"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<div class="page">
  <!-- HERO -->
  <div class="home-hero">
    <div class="hero-badge" style="opacity:0;animation:popIn 0.6s ease 0.1s forwards">
      <div class="dot"></div>16 Types · Night Values
    </div>
    <h1 class="hero-title" style="opacity:0;animation:popIn 0.6s ease 0.25s forwards">
      あなたの<br><span class="grad">夜の価値観</span><br>タイプは？
    </h1>
    <p class="hero-sub" style="opacity:0;animation:popIn 0.6s ease 0.4s forwards">
      24の質問で、あなたの夜のスタイルが分かる。
    </p>

    <!-- 4×4 キャラグリッド -->
    <div class="float-grid" id="floatGrid" style="opacity:0;animation:popIn 0.7s ease 0.5s forwards"></div>
  </div>

  <!-- マーキー -->
  <div class="marquee-wrap" id="marqueeWrap" style="opacity:0;animation:popIn 0.6s ease 0.9s forwards"></div>

  <!-- CTA -->
  <div class="home-cta" style="opacity:0;animation:popIn 0.6s ease 1.0s forwards">
    <div class="stat-row">
      <div class="stat-pill"><b>24</b>問</div>
      <div class="stat-pill"><b>16</b>タイプ</div>
      <div class="stat-pill"><b>∞</b>相性</div>
    </div>
    <a href="quiz.html" class="hero-btn" style="width:100%;max-width:340px;text-align:center;display:block">
      診断スタート →
    </a>
    <a href="characters.html" style="font-size:0.75rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em">
      キャラ一覧を見る ↓
    </a>
  </div>
</div>

<script src="./types.js"></script>
<script src="./common.js"></script>
<script>
const keys = Object.keys(types);

// 4×4 フロートグリッド（16枚全部）
const grid = document.getElementById('floatGrid');
keys.forEach(k => {
  const d = types[k];
  const a = document.createElement('a');
  a.className = 'float-card';
  a.href = 'characters.html#'+k;
  a.innerHTML = d.image
    ? `<img src="${d.image}" alt="${d.name}" loading="lazy"/>
       <div class="fc-overlay"><div class="fc-name">${d.name}</div></div>`
    : `<div class="fc-icon">${d.icon}</div>
       <div class="fc-overlay"><div class="fc-name">${d.name}</div></div>`;
  grid.appendChild(a);
});

// マーキー（2周）
const wrap = document.getElementById('marqueeWrap');
const track = document.createElement('div');
track.className = 'marquee-track';
[...keys,...keys].forEach(k => {
  const d = types[k];
  const chip = document.createElement('a');
  chip.className = 'mq-chip';
  chip.href = 'characters.html#'+k;
  chip.style.textDecoration = 'none';
  chip.innerHTML = d.image
    ? `<img src="${d.image}" alt=""><span>${d.name}</span>`
    : `<span style="font-size:1rem">${d.icon}</span><span>${d.name}</span>`;
  track.appendChild(chip);
});
wrap.appendChild(track);
</script>
</body>
</html>
